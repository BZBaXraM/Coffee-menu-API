services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: coffee-in-lab-api
    container_name: coffee-in-lab-api
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_PATH: /data/menu.db
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai/v1}
    volumes:
      - db-data:/data          # SQLite database (persisted)
      - ./uploads:/app/uploads # dish photos (persisted on host)

volumes:
  db-data:
